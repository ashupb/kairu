<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- LOGIN — genérico, sin nombre de institución hasta que el usuario ingresa -->
<div id="login-screen">
  <div class="l-logo">
    <svg viewBox="0 0 48 48" width="56" height="56" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#1B2B22" stroke-width="2.5"/>
      <rect x="13" y="13" width="6" height="22" fill="#1B2B22"/>
      <polygon points="19,24 19,13 33,13 25.5,24" fill="#1B2B22"/>
      <polygon points="19,24 19,35 33,35 25.5,24" fill="#1B2B22"/>
      <rect x="33" y="32" width="4" height="4" fill="#229957"/>
    </svg>
  </div>
  <div class="l-nombre">EduGestión</div>
  <div class="l-sub">Sistema de gestión escolar institucional</div>

  <div class="l-card">
    <div class="l-card-t">Iniciar sesión</div>
    <div class="l-card-s">Ingresá con tu cuenta institucional</div>

    <div id="login-error" class="login-error" style="display:none"></div>

    <div class="l-form">
      <label class="l-label">Usuario</label>
      <input type="text" id="inp-email" placeholder="nombre.usuario o email" autocomplete="username">
      <label class="l-label" style="margin-top:10px">Contraseña</label>
      <div style="position:relative">
      <input type="password" id="inp-pass" placeholder="Tu contraseña" autocomplete="current-password">
      <button type="button" onclick="togglePass()"
        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#5d6d7e;display:flex;align-items:center"
        id="btn-ojo" aria-label="Mostrar contraseña">
        <svg id="ojo-cerrado" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <svg id="ojo-abierto" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      </div>
    </div>

    <button class="btn-ing" id="btn-login" onclick="login()">
      <span id="btn-login-text">Ingresar</span>
    </button>

    <div class="l-hint">
      ¿Problemas para ingresar? Contactá al administrador de tu institución.
    </div>
  </div>
</div>

<!-- SHELL: visible tras login exitoso -->
<div id="shell" style="display:none">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <svg viewBox="0 0 48 48" width="28" height="28" fill="none" style="flex-shrink:0">
        <circle cx="24" cy="24" r="22" stroke="#229957" stroke-width="2.5"/>
        <rect x="13" y="13" width="6" height="22" fill="#fff"/>
        <polygon points="19,24 19,13 33,13 25.5,24" fill="#fff"/>
        <polygon points="19,24 19,35 33,35 25.5,24" fill="#fff"/>
        <rect x="33" y="32" width="4" height="4" fill="#229957"/>
      </svg>
      <span class="sb-nombre">[KAIROS]</span>
      <button class="sb-toggle" onclick="toggleSidebar()" title="Contraer menú"><span id="sb-toggle-icon">‹</span></button>
    </div>
    <div class="sb-inst-badge" id="sb-inst-badge">
      <div class="sb-inst-logo" id="sb-inst-logo">E</div>
      <div style="min-width:0;overflow:hidden">
        <div class="sb-inst-nombre-text" id="sb-inst-nombre">—</div>
        <div class="sb-inst-sub">Institución</div>
      </div>
    </div>
    <div class="sb-user">
      <div class="sb-av" id="sb-av">—</div>
      <div class="sb-u-info">
        <div class="sb-u-nombre" id="sb-nombre">—</div>
        <div class="sb-u-rol"    id="sb-rol">—</div>
      </div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-bottom">
      <button class="dark-toggle" onclick="toggleDark()">
        <span id="theme-icon">🌙</span>
        <span class="dt-label" id="dark-label">Modo oscuro</span>
      </button>
      <button class="btn-salir" onclick="cerrarSesion()">
        <span>⏻</span>
        <span class="sal-label">Cerrar sesión</span>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="btn-hamburger" onclick="toggleMobileSidebar()" title="Menú">☰</button>
      <button class="tb-back" id="tb-back" onclick="goBack()">‹</button>
      <div class="tb-title" id="tb-title">Inicio</div>
      <div class="tb-right">
        <div class="notif-btn" onclick="toggleNotifPanel()" title="Notificaciones">
          🔔<span class="notif-count" id="notif-count" style="display:none">0</span>
        </div>
        <span class="tb-clock" id="tb-clock">--:--</span>
        <button class="tb-theme" onclick="toggleDark()"><span id="tb-theme-icon">🌙</span></button>
      </div>
    </div>

    <!-- Panel notificaciones -->
    <div id="notif-panel" class="notif-panel" style="display:none">
      <div class="notif-panel-header">
        <span style="font-size:13px;font-weight:600">Notificaciones</span>
        <button onclick="marcarTodasLeidas()" style="font-size:10px;color:var(--verde);background:none;border:none;cursor:pointer">
          Marcar todas leídas
        </button>
      </div>
      <div id="notif-lista"><div class="loading-state small"><div class="spinner"></div></div></div>
    </div>

    <div class="content">
      <div class="page on" id="page-dash"></div>
      <div class="page"    id="page-prob"></div>
      <div class="page"    id="page-obj"></div>
      <div class="page"    id="page-reuniones"></div>
      <div class="page"    id="page-asist"></div>
      <div class="page"    id="page-notas"></div>
      <div class="page"    id="page-leg"></div>
      <div class="page"    id="page-eoe"></div>
      <div class="page"    id="page-agenda"></div>
      <div class="page"    id="page-admin"></div>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Config -->
<script src="js/config.js"></script>

<!-- Módulos -->
<script src="js/nav.js"></script>
<script src="js/ui.js"></script>
<script src="js/agenda.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/problematicas.js"></script>
<script src="js/legajos.js"></script>
<script src="js/modulos.js"></script>
<script src="js/asistencia.js"></script>
<script src="js/calificaciones.js"></script>
<script src="js/configuracion.js"></script>

<!-- Auth y arranque (siempre al final) -->
<script src="js/auth.js"></script>
<script src="js/main.js"></script>

<!-- Overlay sidebar mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

  <!-- Navegación inferior mobile -->
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-items" id="bottom-nav-items"></div>
  </nav>

</body>
</html>
