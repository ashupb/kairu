<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kairú · Familias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ── TOP BAR ───────────────────────────────────────────────── -->
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#229957" stroke-width="2.5"/>
          <rect x="13" y="13" width="6" height="22" fill="#1B2B22"/>
          <polygon points="19,24 19,13 33,13 25.5,24" fill="#1B2B22"/>
          <polygon points="19,24 19,35 33,35 25.5,24" fill="#1B2B22"/>
          <rect x="33" y="32" width="4" height="4" fill="#229957"/>
        </svg>
        <div>
          <span class="topbar-brand-name">Kairú</span>
          <span class="topbar-brand-sub">FAMILIAS</span>
        </div>
      </div>
      <div class="topbar-alumno" id="topbar-alumno"></div>
      <button class="topbar-logout" onclick="logout()" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── LOGIN ─────────────────────────────────────────────────── -->
  <div class="page active" id="page-login">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#229957" stroke-width="2.5"/>
          <rect x="13" y="13" width="6" height="22" fill="#1B2B22"/>
          <polygon points="19,24 19,13 33,13 25.5,24" fill="#1B2B22"/>
          <polygon points="19,24 19,35 33,35 25.5,24" fill="#1B2B22"/>
          <rect x="33" y="32" width="4" height="4" fill="#229957"/>
        </svg>
        <div>
          <div class="login-logo-name">Kairú</div>
          <div class="login-logo-sub">PORTAL DE FAMILIAS</div>
        </div>
      </div>
      <div id="login-error" class="login-error"></div>
      <form id="login-form" onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">EMAIL</label>
          <input type="email" id="login-email" class="form-input"
                 placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">CONTRASEÑA</label>
          <div class="form-input-wrap">
            <input type="password" id="login-password" class="form-input"
                   placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="btn-pass-toggle" onclick="togglePassFamilias()"
                    aria-label="Mostrar contraseña">
              <svg id="fam-ojo-cerrado" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="fam-ojo-abierto" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-full" id="login-btn">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- ── INICIO ────────────────────────────────────────────────── -->
  <div class="page" id="page-inicio"></div>

  <!-- ── COMUNICADOS ───────────────────────────────────────────── -->
  <div class="page" id="page-comunicados"></div>

  <!-- ── SEGUIMIENTO ───────────────────────────────────────────── -->
  <div class="page" id="page-seguimiento"></div>

  <!-- ── ASISTENCIA ────────────────────────────────────────────── -->
  <div class="page" id="page-asistencia"></div>

  <!-- ── AGENDA ────────────────────────────────────────────────── -->
  <div class="page" id="page-agenda"></div>

  <!-- ── MENSAJES ──────────────────────────────────────────────── -->
  <div class="page" id="page-mensajes"></div>

  <!-- ── CONTACTOS ─────────────────────────────────────────────── -->
  <div class="page" id="page-contactos"></div>

  <!-- ── BOTTOM NAV ────────────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- config primero, auth y main a continuación, luego módulos -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/inicio.js"></script>
  <script src="js/comunicados.js"></script>
  <script src="js/seguimiento.js"></script>
  <script src="js/asistencia.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/mensajes.js"></script>
  <script src="js/contactos.js"></script>

</body>
</html>
